{% load static %}
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{% static 'story/css/style.css' %}">
<script src="{% static 'story/js/base.js' %}"></script>

<!DOCTYPE html>
{% load static %}
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu Thành Công</title>
</head>

<body class="bg-dark-bg-body font-sans antialiased text-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 m-4 bg-dark-bg-card rounded-xl shadow-2xl border border-gray-700 text-center">

        <div class="mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-success" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h1 class="text-3xl font-extrabold text-white mb-4">Hoàn Tất Đặt Lại Mật Khẩu</h1>

        <p class="text-gray-400 mb-6">
            Mật khẩu của bạn đã được đặt lại thành công. Bây giờ bạn có thể đăng nhập bằng mật khẩu mới.
        </p>

        <a href="{% url 'login' %}"
            class="inline-block px-6 py-3 bg-primary text-white font-bold rounded-lg shadow-lg hover:bg-blue-500 transition duration-300">
            Đăng nhập ngay
        </a>
    </div>
    <div class="pt-2">
        <a href="/" class="inline-flex items-center justify-center gap-2 w-full px-6 py-2.5 border border-gray-600 text-gray-300 hover:text-white hover:border-primary hover:bg-primary/10 font-medium rounded-full transition-all duration-300 group">
            <svg class="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Trang chủ
        </a>
    </div>

</body>

</html>
