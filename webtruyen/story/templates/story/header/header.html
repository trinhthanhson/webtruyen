{% load static %}
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Alpine.js để toggle menu -->
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                'primary': '#60a5fa',
                'secondary': '#f97316',
                'dark-bg-body': '#262626',
                'dark-bg-card': '#333333',
                'dark-border': '#4b5563',
            },
            fontFamily: {
                sans: ['Inter', 'sans-serif'],
            },
        }
    }
}
</script>

<header class="bg-dark-bg-card shadow-xl sticky top-0 z-50 border-b border-dark-border" x-data="{ open: false }">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        
        <!-- LOGO -->
        <a href="{% url 'home' %}" class="text-2xl font-bold text-primary tracking-wider">WebStory</a>

        <!-- Hamburger Button (Mobile Only) -->
        <button @click="open = !open" class="md:hidden text-gray-300 focus:outline-none">
            <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            <svg x-show="open" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <!-- MENU (ẩn trên mobile) -->
        <nav class="hidden md:flex space-x-6 text-sm font-medium">
            <a href="{% url 'home' %}" class="text-gray-300 hover:text-primary transition">Home</a>
            <a href="{% url 'stories' %}" class="text-gray-300 hover:text-primary transition">Stories</a>
            <a href="{% url 'categories' %}" class="text-gray-300 hover:text-primary transition">Categories</a>
            <a href="{% url 'favorite_list' %}" class="text-gray-300 hover:text-primary transition">Favorites</a>
            <a href="{% url 'history' %}" class="text-gray-300 hover:text-primary transition">History</a>

        </nav>

        <!-- SEARCH + USER -->
        <div class="hidden md:flex items-center space-x-4">
            <!-- Search -->
            <form action="{% url 'search' %}" method="get" class="relative">
                <input type="search" name="q" placeholder="Tìm truyện..." 
                       class="w-48 px-3 py-2 text-sm bg-gray-700 border border-dark-border rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-primary transition">
                <button type="submit" class="absolute right-2 top-2 text-gray-400 hover:text-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </form>

            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="flex items-center gap-2 hover:bg-gray-700 px-2 py-1 rounded-lg transition">
                    <img class="h-8 w-8 rounded-full object-cover"
                         src="{{ user.profile.avatar_url|default:'https://placehold.co/32x32/60a5fa/ffffff?text=U' }}"
                         alt="Avatar"
                         onerror="this.src='https://placehold.co/32x32/60a5fa/ffffff?text=U'">
                    <span class="text-white text-sm font-semibold">{{ user.username }}</span>
                </a>
                <a href="{% url 'logout' %}" class="bg-red-600 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-700">Logout</a>
            {% else %}
                <a href="{% url 'register' %}" class="border border-primary text-primary px-3 py-1 rounded-lg text-sm hover:bg-primary hover:text-white">Sign Up</a>
                <a href="{% url 'login' %}" class="bg-primary text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-500">Log In</a>
            {% endif %}
        </div>
    </div>

    <!-- MENU MOBILE -->
    <div x-show="open" x-transition class="md:hidden bg-dark-bg-card border-t border-dark-border">
        <div class="flex flex-col space-y-3 p-4">
            <a href="{% url 'home' %}" class="text-gray-300 hover:text-primary">Home</a>
            <a href="{% url 'stories' %}" class="text-gray-300 hover:text-primary">Stories</a>
            <a href="{% url 'categories' %}" class="text-gray-300 hover:text-primary">Categories</a>
            <a href="{% url 'favorite_list' %}" class="text-gray-300 hover:text-primary">Favorites</a>

            <hr class="border-gray-700">

            <form action="{% url 'search' %}" method="get" class="relative">
                <input type="search" name="q" placeholder="Tìm truyện..." 
                       class="w-full px-3 py-2 text-sm bg-gray-700 border border-dark-border rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-primary transition">
                <button type="submit" class="absolute right-2 top-2 text-gray-400 hover:text-primary">
                    🔍
                </button>
            </form>

            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="text-white font-semibold mt-2">👤 {{ user.username }}</a>
                <a href="{% url 'logout' %}" class="bg-red-600 text-white text-center py-2 rounded-lg hover:bg-red-700">Logout</a>
            {% else %}
                <a href="{% url 'register' %}" class="border border-primary text-center text-primary py-2 rounded-lg hover:bg-primary hover:text-white">Sign Up</a>
                <a href="{% url 'login' %}" class="bg-primary text-center text-white py-2 rounded-lg hover:bg-blue-500">Log In</a>
            {% endif %}
        </div>
    </div>
</header>
